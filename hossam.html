<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Hossam AL-Taweel | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        html { scroll-behavior: smooth; }
        body {
            background-image: url('back_hossam.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0; color: #fff;
            overflow: hidden; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Animations */
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        @keyframes floating {
            0% { transform: translateY(0px) rotate(var(--rotation, 0deg)); }
            50% { transform: translateY(-12px) rotate(var(--rotation, 0deg)); }
            100% { transform: translateY(0px) rotate(var(--rotation, 0deg)); }
        }

        .page-section::-webkit-scrollbar { display: none; }
        .page-section { -ms-overflow-style: none; scrollbar-width: none; }

        /* --- Top Bar --- */
        .top-bar {
            position: fixed; top: 0; width: 100%; height: 65px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            display: flex; align-items: center; justify-content: flex-start;
            padding: 0 20px; box-sizing: border-box; z-index: 1001;
            border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        }
        .profile-side { display: flex; align-items: center; cursor: pointer; }
        .profile-pfp {
            width: 42px; height: 42px; border-radius: 50%;
            background-image: url('hossam4.png'); background-size: cover;
            border: 2px solid #d4af37; margin-right: 12px;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.4);
        }
        .user-name { font-weight: 700; font-size: 1.05em; letter-spacing: 0.5px; color: #fff; }

        /* --- Navigation Drawer --- */
        .nav-drawer {
            position: fixed; top: 0; left: -100%;
            width: 300px; height: 100vh;
            background: rgba(255, 255, 255, 0.98);
            backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px);
            border-right: 1px solid rgba(212, 175, 55, 0.4);
            display: flex; flex-direction: column;
            transition: 0.5s cubic-bezier(0.85, 0, 0.15, 1);
            z-index: 1002; box-shadow: 20px 0 50px rgba(0,0,0,0.2);
        }
        .nav-drawer.active { left: 0; }
        .drawer-header {
            padding: 45px 25px 25px;
            display: flex; flex-direction: column; align-items: flex-start;
            border-bottom: 1px solid rgba(212, 175, 55, 0.2); margin-bottom: 20px;
        }
        .drawer-pfp {
            width: 75px; height: 75px; border-radius: 50%;
            background-image: url('hossam4.png'); background-size: cover;
            border: 3px solid #d4af37; margin-bottom: 15px;
        }
        .drawer-name { font-size: 1.25em; font-weight: 800; color: #1a1a1a; }
        .drawer-tag { font-size: 0.8em; color: #d4af37; text-transform: uppercase; margin-top: 5px; font-weight: 600; }

        .nav-drawer a {
            display: flex; align-items: center; padding: 16px 25px; 
            color: #333; text-decoration: none; font-size: 1em; font-weight: 700;
            margin: 5px 15px; border-radius: 15px; transition: 0.3s;
            text-transform: uppercase; cursor: pointer;
        }
        .nav-drawer a i { margin-right: 18px; color: #d4af37; font-size: 1.2em; width: 25px; text-align: center; }

        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); display: none; z-index: 1001;
            backdrop-filter: blur(8px);
        }
        .menu-overlay.active { display: block; }

        /* --- Content Layout --- */
        .main-content { padding: 90px 18px 40px; display: flex; justify-content: center; height: 100vh; box-sizing: border-box; }
        .page-section {
            display: none; width: 100%; max-width: 900px;
            animation: fadeIn 0.5s ease-out; overflow-y: auto; padding-bottom: 100px;
        }
        #home-section { display: block; }

        .container { background: transparent; border: none; box-shadow: none; text-align: left; padding: 20px; }
        
        /* Typewriter Bio Styling */
        .bio-box {
            background: rgba(255, 255, 255, 0.08); padding: 22px;
            border-left: 5px solid #d4af37; margin-bottom: 30px;
            text-align: left; font-style: italic; line-height: 1.8; color: #eee;
            min-height: 80px; font-size: 1.1em;
        }

        /* Floating Gold Button */
        .explore-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid #d4af37;
            color: #d4af37;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 0.85em;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            cursor: pointer;
            display: inline-block;
            animation: floating 3s ease-in-out infinite;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(212, 175, 55, 0.2);
        }
        .explore-btn:hover { background: #d4af37; color: #fff; }

        /* Floating Elements */
        .scatter-grid { display: flex; flex-direction: column; gap: 50px; padding: 40px 20px; align-items: center; }
        .float-item {
            width: 170px; border-radius: 15px; overflow: hidden;
            border: 2px solid rgba(212, 175, 55, 0.5); background: #000;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); cursor: pointer;
            transition: 0.3s; animation: floating 4s ease-in-out infinite;
        }
        .float-item:nth-child(odd) { align-self: flex-start; --rotation: -3deg; }
        .float-item:even { align-self: flex-end; --rotation: 3deg; }
        .float-img { width: 100%; height: auto; display: block; }

        /* Social Links */
        .social-float-grid { display: flex; flex-direction: column; gap: 30px; align-items: center; margin-top: 40px; }
        .social-float-item {
            background: rgba(255, 255, 255, 0.1); border: 2px solid #d4af37;
            padding: 15px 30px; border-radius: 50px; text-decoration: none; color: white;
            display: flex; align-items: center; gap: 15px; animation: floating 3.5s ease-in-out infinite;
            transition: 0.3s;
        }
        .social-float-item:hover { transform: scale(1.1) !important; background: #d4af37; color: #1a1a1a; }

        /* Zoom Modal */
        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(0px);
            z-index: 2000; display: flex; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .modal.active { opacity: 1; visibility: visible; backdrop-filter: blur(15px); }
        .modal-content {
            width: 88%; max-width: 600px; border-radius: 20px; transform: scale(0.6);
            transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 2px solid rgba(212, 175, 55, 0.6);
        }
        .modal.active .modal-content { transform: scale(1); }
        .close-x { position: absolute; top: 25px; right: 30px; font-size: 35px; color: #fff; cursor: pointer; }
    </style>
</head>
<body>

    <div id="menuOverlay" class="menu-overlay" onclick="toggleNav()"></div>

    <nav class="top-bar">
        <div class="profile-side" onclick="toggleNav()">
            <div class="profile-pfp"></div>
            <span class="user-name">Hossam AL-Taweel</span>
            <i id="navArrow" class="fas fa-chevron-down" style="font-size: 0.85em; transition: 0.4s; color: #d4af37; margin-left: 10px;"></i>
        </div>
    </nav>

    <div id="navDrawer" class="nav-drawer">
        <div class="drawer-header" onclick="showPage('home')">
            <div class="drawer-pfp"></div>
            <span class="drawer-name">Hossam AL-Taweel</span>
            <span class="drawer-tag">Cybersecurity Specialist</span>
        </div>
        <a onclick="showPage('home')"><i class="fas fa-house"></i>Home</a>
        <a onclick="showPage('certificates')"><i class="fas fa-award"></i>Certifications</a>
        <a onclick="showPage('cv')"><i class="fas fa-file-invoice"></i>MY CV</a>
        <a onclick="showPage('social')"><i class="fas fa-at"></i>social media</a>
    </div>

    <div class="main-content">
        
        <section id="home-section" class="page-section">
            <div class="container" style="padding-left: 30px; margin-top: 40px;">
                <div id="typewriter" class="bio-box"></div>
                <div class="explore-btn" onclick="toggleNav()">take a look <i class="fas fa-arrow-right" style="margin-left: 8px;"></i></div>
            </div>
        </section>

        <section id="certificates-section" class="page-section">
            <div class="container">
      
                <div class="scatter-grid">
                    <div class="float-item"><img src="c1.png" class="float-img" onclick="openCert(this)"></div>
                    <div class="float-item"><img src="c2.png" class="float-img" onclick="openCert(this)"></div>
                    <div class="float-item"><img src="c3.png" class="float-img" onclick="openCert(this)"></div>
                    <div class="float-item"><img src="c4.png" class="float-img" onclick="openCert(this)"></div>
                    <div class="float-item"><img src="hossam1.png" class="float-img" onclick="openCert(this)"></div>
                    <div class="float-item"><img src="hossam2.png" class="float-img" onclick="openCert(this)"></div>
                </div>
            </div>
        </section>

        <section id="cv-section" class="page-section">
            <div class="container" style="display: flex; flex-direction: column; align-items: center;">
               
                <div class="float-item" style="width: 240px; --rotation: 0deg;">
                    <img src="hossam3.png" class="float-img" onclick="openCert(this)">
                </div>
             
            </div>
        </section>

        <section id="social-section" class="page-section">
            <div class="container">
              
                <div class="social-float-grid">
                    <a href="https://github.com/2lert" class="social-float-item" style="--rotation: -2deg; animation-delay: 0s;">
                        <i class="fab fa-github" style="color: #d4af37;"></i><span>HossamALTaweel</span>
                    </a>
                    <a href="https://linkedin.com/in/hossam-altaweel-b496282a0" class="social-float-item" style="--rotation: 2deg; animation-delay: 0.5s;">
                        <i class="fab fa-linkedin" style="color: #d4af37;"></i><span>Hossam AL-Taweel</span>
                    </a>
                    <a href="https://instagram.com/exploi1" class="social-float-item" style="--rotation: -1deg; animation-delay: 1s;">
                        <i class="fab fa-instagram" style="color: #d4af37;"></i><span>@exploi1</span>
                    </a>
                </div>
            </div>
        </section>
    </div>

    <div id="certModal" class="modal" onclick="closeCert()">
        <span class="close-x">✖</span>
        <img id="certBig" class="modal-content">
    </div>

    <script>
        const bioText = "Cybersecurity is not just a subject you study, but a means to protect your information.";
                
        let i = 0;
        const speed = 40; 

        function typeWriter() {
            if (i < bioText.length) {
                document.getElementById("typewriter").innerHTML += bioText.charAt(i);
                i++;
                setTimeout(typeWriter, speed);
            }
        }

        function showPage(pageId) {
            const sections = document.querySelectorAll('.page-section');
            sections.forEach(section => { section.style.display = 'none'; });
            document.getElementById(pageId + '-section').style.display = 'block';
            if (document.getElementById("navDrawer").classList.contains("active")) { toggleNav(); }
            
            if (pageId === 'home' && i === 0) {
                typeWriter();
            }
        }

        function toggleNav() {
            document.getElementById("navDrawer").classList.toggle("active");
            document.getElementById("menuOverlay").classList.toggle("active");
            document.getElementById("navArrow").classList.toggle("rotated");
        }

        function openCert(img) {
            const modal = document.getElementById("certModal");
            document.getElementById("certBig").src = img.src;
            modal.classList.add("active");
        }
        function closeCert() { document.getElementById("certModal").classList.remove("active"); }

        window.onclick = function(event) {
            if (event.target.id === 'menuOverlay' || event.target.id === 'certModal') {
                if (document.getElementById("navDrawer").classList.contains("active")) toggleNav();
                closeCert();
            }
        }

        // Start typing effect on load
        window.onload = typeWriter;
    </script>
</body>
</html>
