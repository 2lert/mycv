<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Mohammad Bakeer | Data Science Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        

        header {
            background-color: #1f2937;
            color: white;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 22px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            transition: 0.3s;
        }

        nav a:hover {
            color: #38bdf8;
        }

        .hero {
            height: 90vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 15px;
        }

        .hero p {
            font-size: 18px;
            max-width: 600px;
            margin-bottom: 25px;
        }

        .btn {
    background: rgba(255, 255, 255, 0.15); /* شفاف */
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); /* عشان يشتغل بكل المتصفحات */

    color: white;
    padding: 14px 30px;
    border-radius: 10px;
    text-decoration: none;
    border: 1px solid rgba(255, 255, 255, 0.3);

    transition: 0.3s ease;
}

/* تأثير عند المرور */
.btn:hover {
    background: rgba(255, 255, 255, 0.25);
    transform: scale(1.05);
}

        .btn:hover {
            background-color: #0ea5e9;
        }

        section {
            padding: 80px 50px;
        }

        .projects {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .card {
            background-color: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        footer {
            background-color: #1f2937;
            color: white;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

<header>
   
    
</header>

<div class="hero">
    <h2>Curriculum vitae</h2>
    <p>
        Aspiring Data Scientist with hands-on experience in machine learning and data analysis.
    </p>
    <a href="#team" class="btn">Take a look</a>
</div>

<section id="team">
    <div class="team-container">

        <a href="hossam.html" class="profile-card">
    <h3 class="name">Hossam</h3>

    <div class="card-content">
        <div class="avatar"></div>

        <div class="info">
            <div class="line long"></div>
            <div class="line medium"></div>
            <div class="line short"></div>
        </div>
    </div>
</a>

        <a href="mohammad.html" class="profile-card">
    <h3 class="name">Mohammad</h3>

    <div class="card-content">
        <div class="avatar"></div>

        <div class="info">
            <div class="line long"></div>
            <div class="line medium"></div>
            <div class="line short"></div>
        </div>
    </div>
</a>

    </div>
</section>



<footer>
    <p>© 2026 Mohammad Bakeer | All Rights Reserved</p>
</footer>

</body>
</html>
